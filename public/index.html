<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>facechat // RAM Social Network</title>

    <script src="tailwind.min.js"></script>
    <script src="app.js" defer></script>
    <script src="alpine.min.js" defer></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-slate-900 text-slate-100 font-sans antialiased"
    x-data="facechat"
  >
    <header
      class="border-b border-slate-800 bg-slate-950/50 backdrop-blur sticky top-0 z-50"
    >
      <div
        class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between"
      >
        <div class="flex items-center space-x-2">
          <span
            class="text-2xl font-black tracking-tighter bg-gradient-to-r from-blue-500 to-indigo-500 bg-clip-text text-transparent"
            >facechat</span
          >
          <span
            class="text-xs font-mono px-2 py-0.5 rounded bg-blue-500/10 text-blue-400 border border-blue-500/20"
            >RAM MVP</span
          >
        </div>

        <nav class="flex items-center space-x-4" x-show="token">
          <button
            @click="currentTab = 'feed'; fetchFeed()"
            :class="currentTab === 'feed' ? 'text-blue-400 font-bold' : 'text-slate-400 hover:text-slate-200'"
            class="transition text-sm"
          >
            Feed
          </button>
          <button
            @click="currentTab = 'friends'"
            :class="currentTab === 'friends' ? 'text-blue-400 font-bold' : 'text-slate-400 hover:text-slate-200'"
            class="transition text-sm"
          >
            Friends
          </button>
          <button
            @click="logout()"
            class="text-xs bg-slate-800 hover:bg-red-900/40 text-slate-300 hover:text-red-200 px-3 py-1.5 rounded-md transition font-medium border border-slate-700 hover:border-red-900/30"
          >
            Logout
          </button>
        </nav>
      </div>
    </header>

    <main class="max-w-2xl mx-auto px-4 py-8">
      <section
        x-show="currentTab === 'auth'"
        class="bg-slate-950 p-8 rounded-xl border border-slate-800 shadow-xl max-w-md mx-auto mt-12"
      >
        <h2
          class="text-2xl font-bold mb-6 text-center"
          x-text="authMode === 'login' ? 'Welcome Back' : 'Create Account'"
        ></h2>

        <form @submit.prevent="handleAuth" class="space-y-4">
          <div
            x-show="authMode === 'signup'"
            x-transition:enter="transition ease-out duration-200"
            x-transition:enter-start="opacity-0 transform scale-95"
            x-transition:enter-end="opacity-100 transform scale-100"
          >
            <label class="block text-xs font-mono text-slate-400 mb-1"
              >Full Name</label
            >
            <input
              type="text"
              x-model="authForm.name"
              class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-100"
            />
          </div>
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1"
              >Email Address</label
            >
            <input
              type="email"
              x-model="authForm.email"
              required
              class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-100"
            />
          </div>
          <div>
            <label class="block text-xs font-mono text-slate-400 mb-1"
              >Password</label
            >
            <input
              type="password"
              x-model="authForm.password"
              required
              class="w-full bg-slate-900 border border-slate-800 rounded-lg px-4 py-2 text-sm focus:outline-none focus:border-blue-500 text-slate-100"
            />
          </div>
          <button
            type="submit"
            class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white text-sm font-semibold py-2.5 rounded-lg transition shadow-md shadow-blue-600/10"
            x-text="authMode === 'login' ? 'Sign In' : 'Sign Up'"
          ></button>
        </form>

        <div
          class="mt-6 pt-6 border-t border-slate-800 text-center text-xs text-slate-400"
        >
          <span
            x-text="authMode === 'login' ? 'New to facechat?' : 'Already have an account?'"
          ></span>
          <button
            @click="authMode = (authMode === 'login' ? 'signup' : 'login')"
            class="text-blue-400 hover:underline ml-1 font-medium"
            x-text="authMode === 'login' ? 'Create one here' : 'Sign in here'"
          ></button>
        </div>
      </section>

      <section x-show="currentTab === 'feed'" class="space-y-6">
        <div class="flex items-center justify-between mb-4">
          <h1 class="text-xl font-bold tracking-tight">Your Network Feed</h1>
          <span class="text-xs text-slate-400"
            >Logged in as:
            <strong class="text-slate-200" x-text="user?.name"></strong
          ></span>
        </div>

        <div
          class="bg-slate-950 p-4 rounded-xl border border-slate-800 shadow-md"
        >
          <textarea
            x-model="newPostContent"
            placeholder="What's happening on your mind?"
            rows="3"
            class="w-full bg-slate-900 border border-slate-800 rounded-lg p-3 text-sm focus:outline-none focus:border-blue-500 resize-none text-slate-200"
          ></textarea>
          <div class="flex justify-end mt-2">
            <button
              @click="createPost"
              class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition"
            >
              Broadcast Post
            </button>
          </div>
        </div>

        <div class="space-y-4">
          <template x-for="post in feed" :key="post.id">
            <div
              class="bg-slate-950 p-5 rounded-xl border border-slate-800 space-y-4"
            >
              <div
                class="flex justify-between items-start border-b border-slate-900 pb-2"
              >
                <div>
                  <h3
                    class="font-semibold text-sm text-slate-200"
                    x-text="post.author.name"
                  ></h3>
                  <p
                    class="text-[10px] font-mono text-slate-500"
                    x-text="new Date(post.createdAt).toLocaleTimeString()"
                  ></p>
                </div>
              </div>
              <p
                class="text-slate-300 text-sm whitespace-pre-wrap"
                x-text="post.content"
              ></p>

              <div class="mt-4 pt-4 border-t border-slate-900 space-y-3">
                <h4
                  class="text-xs font-mono text-slate-400 tracking-wider uppercase"
                >
                  Comments (<span x-text="post.comments?.length || 0"></span>)
                </h4>

                <div class="space-y-2 max-h-60 overflow-y-auto pr-1">
                  <template x-for="comment in post.comments" :key="comment.id">
                    <div
                      class="bg-slate-900/60 p-3 rounded-lg border border-slate-800/40 text-xs"
                    >
                      <div
                        class="flex items-center justify-between text-slate-400 mb-1 font-medium"
                      >
                        <span
                          class="text-blue-400"
                          x-text="comment.author.name"
                        ></span>
                        <span
                          class="text-[9px] font-mono"
                          x-text="new Date(comment.createdAt).toLocaleTimeString()"
                        ></span>
                      </div>
                      <p class="text-slate-300" x-text="comment.content"></p>
                    </div>
                  </template>
                </div>

                <div class="flex items-center space-x-2 mt-2">
                  <input
                    type="text"
                    x-model="newCommentContent[post.id]"
                    placeholder="Write a responsive comment..."
                    @keydown.enter="addComment(post.id)"
                    class="flex-1 bg-slate-900 border border-slate-800 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:border-blue-500 text-slate-200"
                  />
                  <button
                    @click="addComment(post.id)"
                    class="bg-slate-800 hover:bg-blue-600 text-slate-200 hover:text-white text-xs font-medium px-3 py-1.5 rounded-lg transition border border-slate-700 focus:outline-none"
                  >
                    Comment
                  </button>
                </div>
              </div>
            </div>
          </template>

          <div
            x-show="feed.length === 0"
            class="text-center py-12 border border-dashed border-slate-800 rounded-xl text-slate-500 text-sm"
          >
            No broadcasts available inside RAM memory cycles yet. Be the first
            to post!
          </div>
        </div>
      </section>

      <section x-show="currentTab === 'friends'" class="space-y-6">
        <h1 class="text-xl font-bold tracking-tight">
          Social Connection Manager
        </h1>
        <div
          class="bg-slate-950 p-6 rounded-xl border border-slate-800 text-center text-sm text-slate-400"
        >
          Friend request sending, accept workflows, and social connections
          templates go right here.
        </div>
      </section>
    </main>
  </body>
</html>

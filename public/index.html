<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Incognito Chat</title>

    <script src="/tailwind.min.js"></script>

    <script defer src="/storage.service.js"></script>
    <script defer src="/index.js"></script>
    <script defer src="/alpine.min.js"></script>
  </head>
  <body
    x-data="alpineInit"
    class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans select-none antialiased"
  >
    <header
      class="border-b border-slate-900 bg-slate-900/60 backdrop-blur-md px-4 py-3 flex justify-between items-center shrink-0 sticky top-0 z-50"
    >
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
        <h1
          class="text-sm font-bold tracking-wider font-mono text-cyan-400"
          x-text="user.userName || 'Anon'"
        ></h1>
      </div>
      <button
        @click="logout()"
        class="bg-rose-500/10 active:bg-rose-500 text-rose-400 border border-rose-500/20 active:text-white px-2.5 py-1 rounded-md text-[11px] font-bold font-mono transition"
      >
        💥 Burn Token
      </button>
    </header>

    <div
      class="bg-slate-900/20 border-b border-slate-900 flex shrink-0 sticky top-[45px] z-40 backdrop-blur-md"
    >
      <button
        @click="activeTab = 'chat'"
        class="flex-1 text-center py-2.5 text-xs font-mono font-bold uppercase tracking-wider border-b-2 transition"
        :class="activeTab === 'chat' ? 'border-cyan-500 text-cyan-400 bg-cyan-500/5' : 'border-transparent text-slate-500'"
      >
        💬 Global Feed
      </button>
      <button
        @click="activeTab = 'users'"
        class="flex-1 text-center py-2.5 text-xs font-mono font-bold uppercase tracking-wider border-b-2 transition"
        :class="activeTab === 'users' ? 'border-cyan-500 text-cyan-400 bg-cyan-500/5' : 'border-transparent text-slate-500'"
      >
        👥 Lurkers (<span x-text="users.length"></span>)
      </button>
    </div>

    <main class="flex-1 flex flex-col bg-slate-950">
      <div x-show="activeTab === 'chat'" class="flex-1 flex flex-col min-h-0">
        <div
          class="flex-1 overflow-y-auto p-4 space-y-3.5 pb-24"
          id="chat-viewport"
        >
          <template x-for="(msg, index) in chat" :key="index">
            <div
              class="flex flex-col max-w-[85%]"
              :class="msg.user?.id === user.id ? 'ml-auto items-end' : 'mr-auto items-start'"
            >
              <span
                class="text-[9px] font-mono text-slate-600 mb-0.5 px-1"
                x-text="msg.user?.id === user.id ? 'You' : msg.user?.userName"
              ></span>

              <div
                class="p-3 rounded-2xl text-[13px] leading-snug break-words shadow-sm"
                :class="msg.user?.id === user.id ? 'bg-cyan-600 text-white rounded-tr-none' : 'bg-slate-900 text-slate-200 rounded-tl-none border border-slate-800/60'"
              >
                <p class="select-text" x-text="msg.userMessage"></p>
              </div>
            </div>
          </template>

          <div
            x-show="chat.length === 0"
            class="h-40 flex flex-col items-center justify-center text-center p-6 text-slate-700 font-mono text-xs"
          >
            📡 No transmissions intercepted yet.
          </div>
        </div>

        <form
          @submit.prevent="sendMessage()"
          class="p-3 bg-slate-900/90 border-t border-slate-900 flex items-center gap-2 sticky bottom-0 left-0 right-0 backdrop-blur-md z-30"
        >
          <input
            type="text"
            x-model="newMessage"
            placeholder="Type encrypted text..."
            class="flex-1 bg-slate-950 border border-slate-800 rounded-xl px-3.5 py-2.5 text-xs focus:outline-none focus:border-cyan-500 text-slate-200 placeholder-slate-600"
          />
          <button
            type="submit"
            class="bg-cyan-600 active:bg-cyan-500 text-white font-bold text-xs font-mono uppercase tracking-wider px-4 py-2.5 rounded-xl transition"
          >
            Send
          </button>
        </form>
      </div>

      <div x-show="activeTab === 'users'" class="p-4 space-y-2">
        <div class="flex justify-between items-center mb-2 px-1">
          <h3
            class="text-[10px] font-mono text-slate-500 uppercase tracking-wider"
          >
            Active Memory Nodes
          </h3>
          <button
            @click="getAllUsers()"
            class="text-[10px] font-mono text-cyan-500 bg-cyan-500/10 px-2 py-0.5 rounded"
          >
            Force Refresh
          </button>
        </div>

        <div class="space-y-1.5">
          <template x-for="item in users" :key="item.id">
            <div
              class="p-3 rounded-xl bg-slate-900/40 border border-slate-900/60 flex items-center gap-2.5"
              :class="item.id === user.id ? 'border-cyan-500/20 bg-cyan-950/10' : ''"
            >
              <div
                class="w-1.5 h-1.5 rounded-full"
                :class="item.id === user.id ? 'bg-cyan-400 animate-pulse' : 'bg-slate-700'"
              ></div>
              <p
                class="text-xs font-mono font-medium text-slate-300 flex-1 truncate"
                x-text="item.userName"
              ></p>
              <span
                x-show="item.id === user.id"
                class="text-[9px] font-mono bg-cyan-500/10 text-cyan-400 px-1.5 py-0.5 rounded"
                >You</span
              >
            </div>
          </template>
        </div>
      </div>
    </main>
  </body>
</html>

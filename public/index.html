<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Title</title>
    <script defer src="/index.js"></script>
    <script defer src="/alpine.min.js"></script>
  </head>
  <body x-data="alpineInit">
    <!-- ------------------------------------------------------------- -->
    <form @submit.prevent="signup">
      <!-- ------------------------------------------------------------- -->
      <label>User Name</label> <input x-model="data.userName" type="text" />
      <!-- ------------------------------------------------------------- -->
      <label>Password</label> <input x-model="data.password" type="text" />
      <!-- ------------------------------------------------------------- -->
      <button type="signup">Signup</button>
    </form>
    <!-- ------------------------------------------------------------- -->
  </body>
</html>
